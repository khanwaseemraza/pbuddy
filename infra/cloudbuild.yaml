# Build + deploy the PBuddy API to Cloud Run. Migrations are applied separately
# via the Cloud SQL Auth Proxy (see README "Deploy"), not in the build, because
# Cloud Build has no Cloud SQL socket.
#
#   gcloud builds submit --config infra/cloudbuild.yaml --region=europe-west2 .
#
# The Cloud Build service account needs roles/run.admin + iam.serviceAccountUser
# on the runtime SA to run the deploy step in CI.
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'infra/Dockerfile', '-t', '${_IMAGE}', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pbuddy-api
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=pbuddy-run@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:pbuddy-db
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
      - --set-env-vars=FIREBASE_PROJECT_ID=$PROJECT_ID,AUTH_DEV_BYPASS=0,APP_BASE_URL=https://pbuddy-mvp.web.app

images: ['${_IMAGE}']

substitutions:
  _REGION: europe-west2
  _IMAGE: europe-west2-docker.pkg.dev/pbuddy-mvp/pbuddy/api:latest

options:
  logging: CLOUD_LOGGING_ONLY
